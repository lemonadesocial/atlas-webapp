name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: rm -rf node_modules package-lock.json && npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ATLAS_REGISTRY_URL: https://registry.example.com
          NEXT_PUBLIC_LEMONADE_BACKEND_URL: https://backend.example.com
          NEXT_PUBLIC_SITE_URL: https://atlas.example.com
          NEXT_PUBLIC_LEMONADE_AI_URL: https://ai.example.com
