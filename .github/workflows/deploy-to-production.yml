name: Deploy to Production
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  DOCKER_DEFAULT_PLATFORM: linux/amd64
  GITHUB_SHA: ${{ github.sha }}

jobs:
  buildAndPush:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Set up buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-region: ${{ secrets.PRODUCTION_REGION }}
          role-to-assume: ${{ secrets.PRODUCTION_ROLE_TO_ASSUME }}

      - name: Configure environment
        run: |
          aws ssm get-parameter --name ${{ secrets.PRODUCTION_PARAMETER_NAME }} | jq '.Parameter.Value' | jq '. | fromjson' | jq -r 'to_entries | .[] | .key + "=" + .value' >> $GITHUB_ENV || exit 1

      - name: Amazon ECR login
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_ATLAS_REGISTRY_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_ATLAS_REGISTRY_URL }}
            NEXT_PUBLIC_LEMONADE_BACKEND_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_LEMONADE_BACKEND_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_NOMINATIM_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_NOMINATIM_URL }}
            NEXT_PUBLIC_LEMONADE_AI_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_LEMONADE_AI_URL }}
            NEXT_PUBLIC_KRATOS_PUBLIC_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_KRATOS_PUBLIC_URL }}
            NEXT_PUBLIC_IDENTITY_URL=${{ vars.PRODUCTION_NEXT_PUBLIC_IDENTITY_URL }}
          tags: |
            ${{ env.REPOSITORY_URI }}:${{ env.GITHUB_SHA }}
            ${{ env.REPOSITORY_URI }}:release

  deploy:
    needs: buildAndPush
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-region: ${{ secrets.PRODUCTION_REGION }}
          role-to-assume: ${{ secrets.PRODUCTION_ROLE_TO_ASSUME }}

      - name: Configure environment
        run: |
          aws ssm get-parameter --name ${{ secrets.PRODUCTION_PARAMETER_NAME }} | jq '.Parameter.Value' | jq '. | fromjson' | jq -r 'to_entries | .[] | .key + "=" + .value' >> $GITHUB_ENV || exit 1

      - name: Configure kube
        run: |
          eval $KUBECONFIG_COMMAND

      - name: Deploy
        run: |
          kubectl set image --namespace $NAMESPACE deployment/atlas-webapp atlas-webapp=$REPOSITORY_URI:$GITHUB_SHA

      - name: Verify
        run: |
          kubectl rollout status --namespace $NAMESPACE deployment/atlas-webapp
